name: Build mobile apps

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      require_android_store_signing:
        description: Fail Android if upload-key signing secrets are not configured
        required: false
        default: false
        type: boolean
      android_version_code:
        description: Optional Android versionCode override; defaults to the workflow run number
        required: false
        type: string
      android_version_name:
        description: Optional Android versionName override; defaults to 1.0.<versionCode>
        required: false
        type: string
      require_ios_distribution_signing:
        description: Fail iOS if distribution signing secrets are not configured
        required: false
        default: false
        type: boolean
      ios_version_code:
        description: Optional iOS CFBundleVersion override; defaults to the workflow run number
        required: false
        type: string
      ios_version_name:
        description: Optional iOS CFBundleShortVersionString override; defaults to 1.0.<versionCode>
        required: false
        type: string

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  PROJECT_PATH: src/Maui.Diagnostics.Playground/Maui.Diagnostics.Playground.csproj
  ANDROID_PACKAGE_NAME: codes.redth.mauidiagnosticsgallery
  IOS_BUNDLE_ID: codes.redth.mauidiagnosticsgallery
  SENTRY_ORG: dotnet-maui
  SENTRY_PROJECT: maui-diagnostics-playground
  SENTRY_CLI_VERSION: 3.5.1

jobs:
  android:
    name: Android Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Select Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-$HOME/Library/Android/sdk}}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"

          set +o pipefail
          yes | "$sdkmanager" --licenses >/dev/null
          license_status="${PIPESTATUS[1]}"
          set -o pipefail
          if [ "$license_status" -ne 0 ]; then
            exit "$license_status"
          fi

          "$sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Restore MAUI workloads
        run: dotnet workload restore "$PROJECT_PATH"

      - name: Restore Android app
        run: >
          dotnet restore "$PROJECT_PATH"
          -p:TargetFramework=net11.0-android
          -p:MauiDiagnosticsUseCoreClr=true
          -p:MauiDiagnosticsUseNativeProjects=true
          -p:CrashVendor=Sentry
          -p:AndroidPackageFormat=aab
          -p:AndroidLinkTool=r8
          -p:AndroidCreateProguardMappingFile=true
          -p:PublishReadyToRun=false

      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          REQUIRE_ANDROID_STORE_SIGNING: ${{ github.event_name == 'workflow_dispatch' && inputs.require_android_store_signing }}
          PUBLISH_ANDROID_TO_PLAY: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            if [ "${REQUIRE_ANDROID_STORE_SIGNING:-false}" = "true" ] || [ "${PUBLISH_ANDROID_TO_PLAY:-false}" = "true" ]; then
              echo "::error::ANDROID_KEYSTORE_BASE64 is required when Android store signing is required."
              exit 1
            fi

            echo "::warning::ANDROID_KEYSTORE_BASE64 is not configured; Android artifacts will not be signed with a store upload key."
            exit 0
          fi

          keystore_path="$RUNNER_TEMP/android-upload.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Publish Android app
        shell: bash
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
          ANDROID_VERSION_NAME: ${{ inputs.android_version_name }}
          PUBLISH_ANDROID_TO_PLAY: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail

          version_code="${ANDROID_VERSION_CODE:-$GITHUB_RUN_NUMBER}"
          version_name="${ANDROID_VERSION_NAME:-1.0.$version_code}"

          if ! [[ "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Android versionCode must be a positive integer."
            exit 1
          fi

          if [ "$version_code" -gt 2100000000 ]; then
            echo "::error::Android versionCode must be less than or equal to 2100000000."
            exit 1
          fi

          echo "Android versionName=$version_name versionCode=$version_code"

          if [ "${PUBLISH_ANDROID_TO_PLAY:-false}" = "true" ] && [ -z "${SENTRY_DSN:-}" ]; then
            echo "::error::SENTRY_DSN is required to publish Android releases with Sentry enabled."
            exit 1
          fi

          if [ -n "${SENTRY_DSN:-}" ]; then
            sentry_appsettings_path="src/Maui.Diagnostics.Playground/appsettings.local.json"
            printf '{\n  "Sentry": {\n    "Dsn": "%s",\n    "Debug": false\n  }\n}\n' "$SENTRY_DSN" > "$sentry_appsettings_path"
          fi

          publish_args=(
            "$PROJECT_PATH"
            -c Release
            -f net11.0-android
            --no-restore
            -p:MauiDiagnosticsUseCoreClr=true
            -p:MauiDiagnosticsUseNativeProjects=true
            -p:CrashVendor=Sentry
            -p:AndroidPackageFormat=aab
            -p:AndroidLinkTool=r8
            -p:AndroidCreateProguardMappingFile=true
            -p:ApplicationVersion="$version_code"
            -p:ApplicationDisplayVersion="$version_name"
            -p:PublishReadyToRun=false
            -p:ContinuousIntegrationBuild=true
          )

          if [ -n "${ANDROID_KEYSTORE_PATH:-}" ]; then
            missing_secrets=()
            [ -n "${ANDROID_KEY_ALIAS:-}" ] || missing_secrets+=("ANDROID_KEY_ALIAS")
            [ -n "${ANDROID_KEY_PASSWORD:-}" ] || missing_secrets+=("ANDROID_KEY_PASSWORD")
            [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] || missing_secrets+=("ANDROID_KEYSTORE_PASSWORD")

            if [ "${#missing_secrets[@]}" -gt 0 ]; then
              printf '::error::Missing Android signing secret(s): %s\n' "${missing_secrets[*]}"
              exit 1
            fi

            publish_args+=(
              -p:AndroidKeyStore=true
              -p:AndroidSigningKeyStore="$ANDROID_KEYSTORE_PATH"
              -p:AndroidSigningKeyAlias="$ANDROID_KEY_ALIAS"
              -p:AndroidSigningKeyPass="$ANDROID_KEY_PASSWORD"
              -p:AndroidSigningStorePass="$ANDROID_KEYSTORE_PASSWORD"
            )
          fi

          if [ -n "${SENTRY_AUTH_TOKEN:-}" ]; then
            sentry_proguard_uuid="$(uuidgen | tr '[:upper:]' '[:lower:]')"
            echo "SENTRY_PROGUARD_UUID=$sentry_proguard_uuid" >> "$GITHUB_ENV"

            publish_args+=(
              -p:SentryUploadSymbols=true
              -p:SentryUploadSources=true
              -p:SentryUploadAndroidProGuardMapping=true
              -p:SentryProGuardUUID="$sentry_proguard_uuid"
              -p:SentryCreateRelease=true
              -p:SentrySetCommits=true
            )
          elif [ "${PUBLISH_ANDROID_TO_PLAY:-false}" = "true" ]; then
            echo "::error::SENTRY_AUTH_TOKEN is required to publish Android releases with Sentry release, symbol, and mobile build uploads."
            exit 1
          fi

          dotnet publish "${publish_args[@]}"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          if-no-files-found: error
          path: |
            src/Maui.Diagnostics.Playground/bin/Release/net11.0-android/**/*.apk
            src/Maui.Diagnostics.Playground/bin/Release/net11.0-android/**/*.aab

      - name: Upload Android debug files to Sentry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::error::SENTRY_AUTH_TOKEN is required to upload Android debug files to Sentry."
            exit 1
          fi

          search_roots=()
          for root in \
            "src/Maui.Diagnostics.Playground/bin/Release/net11.0-android" \
            "src/Maui.Diagnostics.Playground/obj/Release/net11.0-android"
          do
            if [ -d "$root" ]; then
              search_roots+=("$root")
            fi
          done

          if [ "${#search_roots[@]}" -eq 0 ]; then
            echo "::error::No Android build output directories were found for Sentry debug file upload."
            exit 1
          fi

          debug_file_list="$RUNNER_TEMP/android-sentry-debug-files.txt"
          find "${search_roots[@]}" -type f \( -name '*.pdb' -o -name '*.so' \) ! -name '*.dll.so' | sort -u > "$debug_file_list"
          debug_file_count="$(wc -l < "$debug_file_list" | tr -d ' ')"

          if [ "$debug_file_count" -eq 0 ]; then
            echo "::error::No Android PDB or native .so debug files were found for Sentry upload."
            exit 1
          fi

          echo "Uploading $debug_file_count Android debug file(s) to Sentry:"
          sed 's/^/  /' "$debug_file_list"
          debug_files=()
          while IFS= read -r debug_file; do
            debug_files+=("$debug_file")
          done < "$debug_file_list"

          npx --yes "@sentry/cli@$SENTRY_CLI_VERSION" debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --type pdb \
            --type portablepdb \
            --type elf \
            --include-sources \
            --wait-for 300 \
            "${debug_files[@]}"

      - name: Upload Android ProGuard mapping to Sentry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::error::SENTRY_AUTH_TOKEN is required to upload Android ProGuard mappings to Sentry."
            exit 1
          fi

          if [ -z "${SENTRY_PROGUARD_UUID:-}" ]; then
            echo "::error::SENTRY_PROGUARD_UUID was not produced by the Android publish step."
            exit 1
          fi

          mapping_path=""
          for candidate in \
            "src/Maui.Diagnostics.Playground/bin/Release/net11.0-android/mapping.txt" \
            "src/Maui.Diagnostics.Playground/bin/Release/net11.0-android/publish/mapping.txt"
          do
            if [ -f "$candidate" ]; then
              mapping_path="$candidate"
              break
            fi
          done

          if [ -z "$mapping_path" ]; then
            mapping_path="$(find src/Maui.Diagnostics.Playground -path '*/Release/net11.0-android/*' -type f -name 'mapping.txt' | sort | sed -n '1p')"
          fi

          if [ -z "$mapping_path" ]; then
            echo "::error::No Android ProGuard/R8 mapping.txt file was generated for Sentry upload."
            exit 1
          fi

          echo "Uploading Android ProGuard mapping to Sentry: $mapping_path"
          proguard_upload_output="$RUNNER_TEMP/sentry-proguard-upload.txt"
          set +e
          npx --yes "@sentry/cli@$SENTRY_CLI_VERSION" upload-proguard \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --require-one \
            --uuid "$SENTRY_PROGUARD_UUID" \
            "$mapping_path" 2>&1 | tee "$proguard_upload_output"
          proguard_upload_status="${PIPESTATUS[0]}"
          set -e

          if [ "$proguard_upload_status" -ne 0 ]; then
            if grep -qi 'already exists' "$proguard_upload_output"; then
              echo "::notice::Android ProGuard mapping was already uploaded by the Sentry MSBuild target."
            else
              exit "$proguard_upload_status"
            fi
          fi

      - name: Validate Play Console publishing
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is required to publish Android releases to Play Console."
            exit 1
          fi

      - name: Select Android release artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: android_release_artifact
        shell: bash
        run: |
          set -euo pipefail

          artifact_list="$RUNNER_TEMP/android-play-artifacts.txt"
          find src/Maui.Diagnostics.Playground/bin/Release/net11.0-android/publish -type f -name '*-Signed.aab' | sort > "$artifact_list"
          artifact_count="$(wc -l < "$artifact_list" | tr -d ' ')"

          if [ "$artifact_count" -eq 0 ]; then
            find src/Maui.Diagnostics.Playground/bin/Release/net11.0-android/publish -type f -name '*-Signed.apk' | sort > "$artifact_list"
            artifact_count="$(wc -l < "$artifact_list" | tr -d ' ')"
          fi

          if [ "$artifact_count" -ne 1 ]; then
            printf '::error::Expected exactly one signed Android publish artifact for Play upload, found %s.\n' "$artifact_count"
            sed 's/^/  /' "$artifact_list"
            exit 1
          fi

          artifact_path="$(sed -n '1p' "$artifact_list")"
          echo "Selected Android release artifact: $artifact_path"
          printf 'path=%s\n' "$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload Android build to Sentry Size Analysis
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          release_artifact_path="${{ steps.android_release_artifact.outputs.path }}"
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::error::SENTRY_AUTH_TOKEN is required to upload Android builds to Sentry Size Analysis."
            exit 1
          fi

          npx --yes "@sentry/cli@$SENTRY_CLI_VERSION" build upload \
            "$release_artifact_path" \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --build-configuration "Release" \
            --head-sha "$GITHUB_SHA" \
            --vcs-provider "github" \
            --head-repo-name "$GITHUB_REPOSITORY" \
            --head-ref "${GITHUB_REF_NAME:-main}" \
            --base-sha "" \
            --base-ref ""

      - name: Publish Android to Play internal testing
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.ANDROID_PACKAGE_NAME }}
          releaseFiles: ${{ steps.android_release_artifact.outputs.path }}
          tracks: internal
          status: completed

  ios:
    name: iOS Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Restore MAUI workloads
        run: dotnet workload restore "$PROJECT_PATH"

      - name: Restore iOS app
        run: dotnet restore "$PROJECT_PATH" -p:TargetFramework=net11.0-ios -r iossimulator-x64

      - name: Build iOS simulator app
        run: >
          dotnet build "$PROJECT_PATH"
          -c Release
          -f net11.0-ios
          -r iossimulator-x64
          --no-restore
          -p:MauiDiagnosticsUseCoreClr=true
          -p:MauiDiagnosticsUseNativeProjects=true
          -p:CrashVendor=None
          -p:CodesignKey=
          -p:ContinuousIntegrationBuild=true

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-release
          if-no-files-found: error
          path: src/Maui.Diagnostics.Playground/bin/Release/net11.0-ios/iossimulator-x64/**/*.app

      - name: Prepare iOS distribution signing
        id: ios_signing
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_CODESIGN_KEY: ${{ secrets.IOS_CODESIGN_KEY }}
          REQUIRE_IOS_DISTRIBUTION_SIGNING: ${{ github.event_name == 'workflow_dispatch' && inputs.require_ios_distribution_signing }}
          PUBLISH_IOS_TO_TESTFLIGHT: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail

          missing_secrets=()
          [ -n "${IOS_DISTRIBUTION_CERTIFICATE_BASE64:-}" ] || missing_secrets+=("IOS_DISTRIBUTION_CERTIFICATE_BASE64")
          [ -n "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:-}" ] || missing_secrets+=("IOS_DISTRIBUTION_CERTIFICATE_PASSWORD")
          [ -n "${IOS_PROVISIONING_PROFILE_BASE64:-}" ] || missing_secrets+=("IOS_PROVISIONING_PROFILE_BASE64")

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            if [ "${REQUIRE_IOS_DISTRIBUTION_SIGNING:-false}" = "true" ] || [ "${PUBLISH_IOS_TO_TESTFLIGHT:-false}" = "true" ]; then
              printf '::error::Missing iOS distribution signing secret(s): %s\n' "${missing_secrets[*]}"
              exit 1
            fi

            printf '::warning::Missing iOS distribution signing secret(s): %s; skipping signed iOS IPA publish.\n' "${missing_secrets[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          certificate_path="$RUNNER_TEMP/ios-distribution-certificate.p12"
          profile_path="$RUNNER_TEMP/ios-distribution-profile.mobileprovision"
          profile_plist_path="$RUNNER_TEMP/ios-distribution-profile.plist"
          keychain_path="$RUNNER_TEMP/ios-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          existing_keychains=()
          while IFS= read -r keychain; do
            keychain="${keychain//\"/}"
            [ -n "$keychain" ] && existing_keychains+=("$keychain")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$keychain_path" "${existing_keychains[@]}"

          security cms -D -i "$profile_path" > "$profile_plist_path"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist_path")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist_path")"
          profile_app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist_path")"
          get_task_allow="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$profile_plist_path" 2>/dev/null || echo false)"

          case "$profile_app_id" in
            *."$IOS_BUNDLE_ID"|*".*") ;;
            *)
              printf '::error::iOS provisioning profile app identifier %s does not match bundle id %s.\n' "$profile_app_id" "$IOS_BUNDLE_ID"
              exit 1
              ;;
          esac

          if [ "$get_task_allow" = "true" ]; then
            echo "::error::iOS provisioning profile has get-task-allow=true. Use an App Store, Ad Hoc, or Enterprise distribution profile, not a development profile."
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          codesign_key="${IOS_CODESIGN_KEY:-}"
          if [ -z "$codesign_key" ]; then
            codesign_key="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/^.*"\(Apple Distribution:[^"]*\)".*$/\1/p' | sed -n '1p')"
          fi

          if [ -z "$codesign_key" ]; then
            echo "::error::No Apple Distribution signing identity was found in the imported certificate. Set IOS_CODESIGN_KEY if the identity name is non-standard."
            exit 1
          fi

          {
            printf 'codesign_key=%s\n' "$codesign_key"
            printf 'codesign_provision=%s\n' "$profile_name"
            printf 'keychain_path=%s\n' "$keychain_path"
            echo "configured=true"
          } >> "$GITHUB_OUTPUT"

      - name: Restore iOS device app
        if: steps.ios_signing.outputs.configured == 'true'
        run: dotnet restore "$PROJECT_PATH" -p:TargetFramework=net11.0-ios -r ios-arm64

      - name: Publish signed iOS IPA
        if: steps.ios_signing.outputs.configured == 'true'
        shell: bash
        env:
          IOS_CODESIGN_KEY: ${{ steps.ios_signing.outputs.codesign_key }}
          IOS_CODESIGN_PROVISION: ${{ steps.ios_signing.outputs.codesign_provision }}
          IOS_VERSION_CODE: ${{ inputs.ios_version_code }}
          IOS_VERSION_NAME: ${{ inputs.ios_version_name }}
        run: |
          set -euo pipefail

          version_code="${IOS_VERSION_CODE:-$GITHUB_RUN_NUMBER}"
          version_name="${IOS_VERSION_NAME:-1.0.$version_code}"

          if ! [[ "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::iOS CFBundleVersion must be a positive integer."
            exit 1
          fi

          echo "iOS CFBundleShortVersionString=$version_name CFBundleVersion=$version_code"

          dotnet publish "$PROJECT_PATH" \
            -c Release \
            -f net11.0-ios \
            -r ios-arm64 \
            --no-restore \
            -p:MauiDiagnosticsUseCoreClr=true \
            -p:MauiDiagnosticsUseNativeProjects=true \
            -p:CrashVendor=None \
            -p:ApplicationVersion="$version_code" \
            -p:ApplicationDisplayVersion="$version_name" \
            -p:ArchiveOnBuild=true \
            -p:BuildIpa=true \
            -p:CodesignKey="$IOS_CODESIGN_KEY" \
            -p:CodesignProvision="$IOS_CODESIGN_PROVISION" \
            -p:ContinuousIntegrationBuild=true

      - name: Upload signed iOS IPA artifact
        if: steps.ios_signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-device-release
          if-no-files-found: error
          path: src/Maui.Diagnostics.Playground/bin/Release/net11.0-ios/ios-arm64/publish/*.ipa

      - name: Select iOS release artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: ios_release_artifact
        shell: bash
        run: |
          set -euo pipefail

          artifact_list="$RUNNER_TEMP/ios-testflight-artifacts.txt"
          find src/Maui.Diagnostics.Playground/bin/Release/net11.0-ios/ios-arm64/publish -type f -name '*.ipa' | sort > "$artifact_list"
          artifact_count="$(wc -l < "$artifact_list" | tr -d ' ')"

          if [ "$artifact_count" -ne 1 ]; then
            printf '::error::Expected exactly one signed iOS IPA for TestFlight upload, found %s.\n' "$artifact_count"
            sed 's/^/  /' "$artifact_list"
            exit 1
          fi

          artifact_path="$(sed -n '1p' "$artifact_list")"
          echo "Selected iOS release artifact: $artifact_path"
          printf 'path=%s\n' "$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Validate TestFlight publishing
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          missing_secrets=()
          [ -n "${APP_STORE_CONNECT_API_KEY_ID:-}" ] || missing_secrets+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -n "${APP_STORE_CONNECT_API_ISSUER_ID:-}" ] || missing_secrets+=("APP_STORE_CONNECT_API_ISSUER_ID")
          [ -n "${APP_STORE_CONNECT_API_PRIVATE_KEY:-}" ] || missing_secrets+=("APP_STORE_CONNECT_API_PRIVATE_KEY")

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            printf '::error::Missing App Store Connect secret(s): %s\n' "${missing_secrets[*]}"
            exit 1
          fi

      - name: Upload iOS to TestFlight
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.ios_release_artifact.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Cleanup iOS signing keychain
        if: always() && steps.ios_signing.outputs.keychain_path != ''
        shell: bash
        env:
          IOS_KEYCHAIN_PATH: ${{ steps.ios_signing.outputs.keychain_path }}
        run: security delete-keychain "$IOS_KEYCHAIN_PATH" || true

  maccatalyst:
    name: Mac Catalyst Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Restore MAUI workloads
        run: dotnet workload restore "$PROJECT_PATH"

      - name: Restore Mac Catalyst app
        run: dotnet restore "$PROJECT_PATH" -p:TargetFramework=net11.0-maccatalyst -r maccatalyst-x64

      - name: Build Mac Catalyst app
        run: >
          dotnet build "$PROJECT_PATH"
          -c Release
          -f net11.0-maccatalyst
          -r maccatalyst-x64
          --no-restore
          -p:MauiDiagnosticsUseCoreClr=true
          -p:MauiDiagnosticsUseNativeProjects=true
          -p:CrashVendor=None
          -p:CodesignKey=
          -p:CreatePackage=false
          -p:ContinuousIntegrationBuild=true

      - name: Upload Mac Catalyst artifact
        uses: actions/upload-artifact@v4
        with:
          name: maccatalyst-release
          if-no-files-found: error
          path: src/Maui.Diagnostics.Playground/bin/Release/net11.0-maccatalyst/maccatalyst-x64/**/*.app
